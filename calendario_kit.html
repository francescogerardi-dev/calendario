<html lang="it"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione KIT & SWITCH - Calendario</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        :root {
            --primary-color: #007bff;
            --kit-color: #2c3e50;
            --custom-color: #8e44ad;
            --switch-color: #e67e22; /* Arancione per lo SWITCH */
            --holiday-color: #d1d1d1;
            --bg-color: #f8f9fa;
            --note-highlight: #ffcc00;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background-color: var(--bg-color); }
        
        #toolbar-container {
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
        }

        #toolbar { padding: 15px; display: none; gap: 10px; justify-content: center; flex-wrap: wrap; }

        #calendar-outer-wrapper {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        #calendar-zoom-wrapper { transform-origin: top center; transition: transform 0.2s ease; }

        /* EVENTI STILI */
        .fc-event { 
            border: 2px solid transparent !important; 
            padding: 2px 4px !important; 
            font-size: 0.85em !important;
            white-space: normal !important; 
            display: block !important;
            border-radius: 4px !important;
            cursor: pointer;
        }
        
        .fc-event-kit { background-color: var(--kit-color) !important; color: white !important; }
        .fc-event-custom { background-color: var(--custom-color) !important; color: white !important; }
        .fc-event-holiday { background-color: var(--holiday-color) !important; color: #555 !important; border: 1px solid #bbb !important; }
        
        /* NUOVO STILE SWITCH */
        .fc-event-switch { 
            background-color: var(--switch-color) !important; 
            color: white !important; 
            font-weight: bold !important;
            border: 2px solid #d35400 !important;
        }

        .event-has-notes { border: 2px solid var(--note-highlight) !important; box-shadow: 0 0 4px rgba(255, 204, 0, 0.5); }

        .fc-day-sat, .fc-day-sun { background-color: #f4f4f4 !important; }
        .fc-day-sun .fc-col-header-cell-cushion { color: #d9534f; }

        button { padding: 8px 16px; cursor: pointer; border-radius: 6px; border: 1px solid #ddd; background: white; font-weight: 600; }
        .btn-zoom { background: #eee; font-size: 1.2em; padding: 5px 15px; }
        .btn-save { background: var(--primary-color); color: white; border: none; }
        .btn-danger { color: #d9534f; border-color: #d9534f; }
    </style>
</head>
<body>

    <div id="toolbar-container">
        <div class="controls-row">
            <button onclick="toggleToolbar()">⚙️ Gestione <span id="arrow">▲</span></button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
                <span id="zoom-val">100%</span>
                <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
            </div>
        </div>
        <div id="toolbar">
            <button class="btn-save" onclick="exportToJson()">💾 Backup JSON</button>
            <button onclick="document.getElementById('fileInput').click()">📂 Carica da JSON</button>
            <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importFromJson(event)">
            <button class="btn-danger" onclick="clearCalendar()">🗑️ Svuota Tutto</button>
        </div>
    </div>

    <div id="calendar-outer-wrapper">
        <div id="calendar-zoom-wrapper">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        let calendar;
        let currentZoom = 1.0;

        const holidays = [
            { title: "Capodanno", start: "2026-01-01", className: "fc-event-holiday", editable: false },
            { title: "Epifania", start: "2026-01-06", className: "fc-event-holiday", editable: false },
            { title: "Pasqua", start: "2026-04-05", className: "fc-event-holiday", editable: false },
            { title: "Pasquetta", start: "2026-04-06", className: "fc-event-holiday", editable: false },
            { title: "Liberazione", start: "2026-04-25", className: "fc-event-holiday", editable: false },
            { title: "Festa del Lavoro", start: "2026-05-01", className: "fc-event-holiday", editable: false },
            { title: "Festa della Repubblica", start: "2026-06-02", className: "fc-event-holiday", editable: false },
            { title: "Ferragosto", start: "2026-08-15", className: "fc-event-holiday", editable: false },
            { title: "Ognissanti", start: "2026-11-01", className: "fc-event-holiday", editable: false },
            { title: "Immacolata", start: "2026-12-08", className: "fc-event-holiday", editable: false },
            { title: "Natale", start: "2026-12-25", className: "fc-event-holiday", editable: false },
            { title: "S. Stefano", start: "2026-12-26", className: "fc-event-holiday", editable: false }
        ];

        function toggleToolbar() {
            const tb = document.getElementById('toolbar');
            const arrow = document.getElementById('arrow');
            const isVisible = (tb.style.display === "flex");
            tb.style.display = isVisible ? "none" : "flex";
            arrow.innerText = isVisible ? "▼" : "▲";
        }

        function changeZoom(delta) {
            currentZoom = Math.min(Math.max(0.3, currentZoom + delta), 1.0);
            const wrapper = document.getElementById('calendar-zoom-wrapper');
            document.getElementById('zoom-val').innerText = Math.round(currentZoom * 100) + "%";
            wrapper.style.transform = `scale(${currentZoom})`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const savedData = localStorage.getItem('pico_db');
            
            let initialEvents = savedData ? JSON.parse(savedData) : [];
            initialEvents = initialEvents.filter(e => !e.className.includes('fc-event-holiday'));
            initialEvents = initialEvents.concat(holidays);

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'it',
                firstDay: 1, 
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'multiMonthYear,dayGridMonth'
                },
                buttonText: { today: 'Oggi', month: 'Mese', year: 'Anno' },
                editable: true,
                selectable: true,
                events: initialEvents,
                
                eventDidMount: function(info) {
                    if (info.event.classNames.includes('fc-event-holiday')) {
                        info.el.style.opacity = "0.8";
                    }
                    const note = info.event.extendedProps.note;
                    if (note && note.trim() !== "") {
                        info.el.setAttribute('title', "Note: " + note);
                        info.el.classList.add('event-has-notes');
                    }
                },

                select: function(info) {
                    let nome = prompt("Nome evento (Vuoto per 'KIT'):");
                    if (nome !== null) {
                        let title = nome.trim() === "" ? "KIT" : nome;
                        
                        // LOGICA SWITCH
                        let isSwitch = confirm("Si tratta di un evento SWITCH?");
                        let cls = isSwitch ? "fc-event-switch" : (nome.trim() === "" ? "fc-event-kit" : "fc-event-custom");
                        
                        const note = prompt("Note per '" + title + "':");
                        
                        calendar.addEvent({
                            title: title, 
                            start: info.startStr, 
                            end: info.endStr, 
                            allDay: info.allDay,
                            extendedProps: { note: note || "", isSwitch: isSwitch }, 
                            className: cls
                        });
                        saveToLocal();
                    }
                    calendar.unselect();
                },

                eventClick: function(info) {
                    if (info.event.classNames.includes('fc-event-holiday')) return;
                    
                    const isSw = info.event.extendedProps.isSwitch;
                    const azione = confirm("EVENTO: " + info.event.title + 
                                         "\nSWITCH: " + (isSw ? "SÌ" : "NO") +
                                         "\nNOTE: " + (info.event.extendedProps.note || "-") + 
                                         "\n\nPremi OK per modificare note/switch, Annulla per eliminare.");
                    
                    if (azione) {
                        // Modifica Switch
                        if(confirm("Vuoi cambiare lo stato dello SWITCH?")) {
                            const nuovoStato = !isSw;
                            info.event.setExtendedProp('isSwitch', nuovoStato);
                            let nuovaCls = nuovoStato ? "fc-event-switch" : (info.event.title === "KIT" ? "fc-event-kit" : "fc-event-custom");
                            info.event.setProp('classNames', [nuovaCls]);
                        }
                        
                        // Modifica Note
                        const n = prompt("Aggiorna note:", info.event.extendedProps.note);
                        if (n !== null) info.event.setExtendedProp('note', n);
                        
                        saveToLocal();
                        calendar.render();
                    } else {
                        if(confirm("Eliminare l'evento?")) {
                            info.event.remove();
                            saveToLocal();
                        }
                    }
                },
                eventAdd: saveToLocal,
                eventChange: saveToLocal,
                eventRemove: saveToLocal
            });

            calendar.render();
        });

        function saveToLocal() {
            const events = calendar.getEvents()
                .filter(e => !e.classNames.includes('fc-event-holiday'))
                .map(e => ({
                    title: e.title, start: e.startStr, end: e.endStr, allDay: e.allDay,
                    extendedProps: e.extendedProps, 
                    className: e.classNames.filter(c => c !== 'event-has-notes')
                }));
            localStorage.setItem('pico_db', JSON.stringify(events));
        }

        function exportToJson() {
            const data = localStorage.getItem('pico_db');
            if(!data) return;
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'backup_calendario.json'; a.click();
        }

        function importFromJson(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('pico_db', e.target.result);
                location.reload();
            };
            reader.readAsText(file);
        }

        function clearCalendar() { if(confirm("Sei sicuro di voler svuotare tutto il calendario?")) { localStorage.removeItem('pico_db'); location.reload(); } }
    </script>
</body></html>
