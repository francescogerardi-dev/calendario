<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Dinamico Verde/Blu - Firebase 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        :root {
            --kit: #2c3e50;
            --custom: #8e44ad;
            --switch-border: #ff0000;
            --bg-verde: #eaffea; /* Verde molto tenue */
            --bg-blu: #ebf5ff;   /* Blu molto tenue */
            --note-highlight: #ffcc00;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #calendar-outer-wrapper { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        /* Classi per la colorazione delle celle */
        .bg-cella-verde { background-color: var(--bg-verde) !important; }
        .bg-cella-blu { background-color: var(--bg-blu) !important; }

        /* Stili Eventi */
        .fc-event { border: 2px solid transparent !important; padding: 2px 4px !important; border-radius: 4px !important; cursor: pointer; }
        .fc-event-kit { background-color: var(--kit) !important; color: white !important; }
        .fc-event-custom { background-color: var(--custom) !important; color: white !important; }
        
        .event-is-switch { 
            border: 3px solid var(--switch-border) !important; 
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4) !important;
        }

        .event-has-notes { border-color: var(--note-highlight) !important; }

        /* Sync status bar */
        .sync-indicator { font-size: 0.85em; padding: 5px 12px; border-radius: 20px; margin-bottom: 10px; display: inline-block; }
        .sync-ok { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div id="sync-status" class="sync-indicator">Connessione...</div>
    
    <div id="calendar-outer-wrapper">
        <div id="calendar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyKOYvV18rJ2E6wedKB4NSvu-gP_hMDPI",
            authDomain: "calendario-kit.firebaseapp.com",
            databaseURL: "https://calendario-kit-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "calendario-kit",
            appId: "1:912995766124:web:2ee26f77adbe6da28bad49"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const eventsRef = db.ref('pico_events_2026');

        let calendar;

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'it',
                firstDay: 1,
                height: 'auto',
                selectable: true,
                editable: true,
                
                // Questa funzione colora le celle ogni volta che vengono disegnate
                dayCellDidMount: function(info) {
                    const dataCella = info.date;
                    const dataInizioLogica = new Date(2026, 2, 4); // 4 Marzo 2026 (Mese è 0-indexed, quindi 2)

                    if (dataCella < dataInizioLogica) return;

                    // Calcoliamo lo stato (Verde o Blu) in base agli SWITCH precedenti
                    const colore = calcolaColorePerData(dataCella);
                    info.el.classList.add(colore === 'verde' ? 'bg-cella-verde' : 'bg-cella-blu');
                },

                eventDidMount: (info) => {
                    if (info.event.extendedProps.isSwitch) info.el.classList.add('event-is-switch');
                    if (info.event.extendedProps.note) info.el.classList.add('event-has-notes');
                },

                select: function(info) {
                    let nome = prompt("Nome evento (Vuoto per 'KIT'):");
                    if (nome !== null) {
                        let isSw = confirm("ATTIVARE lo SWITCH per questo evento?");
                        calendar.addEvent({
                            title: nome.trim() === "" ? "KIT" : nome,
                            start: info.startStr,
                            allDay: true,
                            extendedProps: { note: prompt("Note:") || "", isSwitch: isSw },
                            className: nome.trim() === "" ? "fc-event-kit" : "fc-event-custom"
                        });
                        syncAndRefresh();
                    }
                    calendar.unselect();
                },

                eventClick: function(info) {
                    if (confirm("Eliminare l'evento?")) {
                        info.event.remove();
                        syncAndRefresh();
                    }
                },

                eventDrop: syncAndRefresh, // Se sposti un evento, ricalcola i colori
            });

            calendar.render();

            eventsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                calendar.removeAllEvents();
                if (data) calendar.addEventSource(Object.values(data));
                document.getElementById('sync-status').innerText = "Sincronizzato ✔️";
                document.getElementById('sync-status').className = "sync-indicator sync-ok";
                calendar.render(); // Forza il ridisegno per le celle
            });
        });

        function calcolaColorePerData(dataTarget) {
            // 1. Prendi tutti gli eventi che sono SWITCH
            const tuttiGliEventi = calendar.getEvents();
            const switchEvents = tuttiGliEventi
                .filter(e => e.extendedProps.isSwitch === true)
                .sort((a, b) => a.start - b.start);

            let statoAttuale = 'verde'; // Partenza 4 Marzo
            const dataInizio = new Date(2026, 2, 4).getTime();
            const dataTargetTime = dataTarget.getTime();

            // 2. Conta quanti switch sono avvenuti tra il 4 marzo e la data della cella
            for (let ev of switchEvents) {
                const dataEv = new Date(ev.start).getTime();
                if (dataEv >= dataInizio && dataEv <= dataTargetTime) {
                    statoAttuale = (statoAttuale === 'verde') ? 'blu' : 'verde';
                }
            }
            return statoAttuale;
        }

        function syncAndRefresh() {
            const toSave = calendar.getEvents().map(e => ({
                title: e.title,
                start: e.startStr,
                allDay: e.allDay,
                extendedProps: e.extendedProps || {},
                className: e.classNames.join(' ').replace('event-is-switch', '').replace('event-has-notes', '').trim()
            }));
            eventsRef.set(toSave);
            calendar.render(); // Ricarica la grafica delle celle
        }
    </script>
</body>
</html>
