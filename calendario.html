<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Logistica KIT & SWITCH 2.3 - Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        :root {
            --kit: #2c3e50;
            --custom: #8e44ad;
            --bg-verde: #eaffea; 
            --bg-blu: #ebf5ff;   
            --note-highlight: #ffcc00;
            --today-border: #007bff; /* Colore per evidenziare oggi */
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background-color: #f8f9fa; }
        #calendar-outer-wrapper { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        /* Colorazione Dinamica Celle */
        .bg-cella-verde { background-color: var(--bg-verde) !important; }
        .bg-cella-blu { background-color: var(--bg-blu) !important; }

        /* --- EVIDENZIA OGGI --- */
        .fc-day-today {
            border: 3px solid var(--today-border) !important;
            box-shadow: inset 0 0 10px rgba(0, 123, 255, 0.2) !important;
            position: relative;
            z-index: 5; /* Assicura che il bordo sia sopra i vicini */
        }

        /* Stili Eventi */
        .fc-event { border: 2px solid transparent !important; padding: 2px 4px !important; border-radius: 4px !important; cursor: pointer; }
        .fc-event-kit { background-color: var(--kit) !important; color: white !important; }
        .fc-event-custom { background-color: var(--custom) !important; color: white !important; }
        
        /* Stile SWITCH */
        .event-is-switch { 
            border: 3px solid rgba(0,0,0,0.3) !important; 
            box-shadow: inset 0 0 4px rgba(255,255,255,0.4) !important;
            font-weight: bold !important;
        }
        .event-has-notes { border: 2px solid var(--note-highlight) !important; }

        .sync-indicator { font-size: 0.85em; font-weight: bold; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
        .sync-ok { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div id="sync-status" class="sync-indicator">Connessione...</div>

    <div id="calendar-outer-wrapper">
        <div id="calendar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyKOYvV18rJ2E6wedKB4NSvu-gP_hMDPI",
            authDomain: "calendario-kit.firebaseapp.com",
            databaseURL: "https://calendario-kit-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "calendario-kit",
            appId: "1:912995766124:web:2ee26f77adbe6da28bad49"
        };

        firebase.initializeApp(firebaseConfig);
        firebase.appCheck().activate('6LeOnW4sAAAAADtdy1-GTZPaYzPldNMAshqmm_0e', true);
        const db = firebase.database();
        const eventsRef = db.ref('pico_events_2026');

        let calendar;

        function ricalcolaColoriCelle() {
            const dataInizioLogica = new Date(2026, 2, 4);
            dataInizioLogica.setHours(0,0,0,0);

            const switchDates = calendar.getEvents()
                .filter(e => e.extendedProps.isSwitch === true)
                .map(e => {
                    let d = new Date(e.start);
                    d.setHours(0,0,0,0);
                    return d.getTime();
                })
                .sort((a, b) => a - b);

            const celle = document.querySelectorAll('.fc-daygrid-day');

            celle.forEach(cella => {
                const dataCellaAttr = cella.getAttribute('data-date');
                if (!dataCellaAttr) return;

                const dataCella = new Date(dataCellaAttr);
                dataCella.setHours(0,0,0,0);

                // Reset colori precedenti
                cella.classList.remove('bg-cella-verde', 'bg-cella-blu');

                if (dataCella >= dataInizioLogica) {
                    let statoVerde = true;
                    for (let swTime of switchDates) {
                        if (swTime <= dataCella.getTime()) {
                            statoVerde = !statoVerde;
                        }
                    }
                    cella.classList.add(statoVerde ? 'bg-cella-verde' : 'bg-cella-blu');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'it',
                firstDay: 1,
                height: 'auto',
                selectable: true,
                editable: true,
                
                // Ricalcolo colori su ogni cambio vista o ricarica
                datesSet: ricalcolaColoriCelle,

                eventDidMount: (info) => {
                    if (info.event.extendedProps.isSwitch) info.el.classList.add('event-is-switch');
                    if (info.event.extendedProps.note) info.el.classList.add('event-has-notes');
                },

                select: function(info) {
                    let nome = prompt("Nome evento (Vuoto per 'KIT'):");
                    if (nome !== null) {
                        let isSw = confirm("ATTIVARE lo SWITCH?");
                        calendar.addEvent({
                            title: nome.trim() === "" ? "KIT" : nome,
                            start: info.startStr,
                            allDay: true,
                            extendedProps: { note: prompt("Note:") || "", isSwitch: isSw },
                            className: nome.trim() === "" ? "fc-event-kit" : "fc-event-custom"
                        });
                        syncToFirebase();
                    }
                    calendar.unselect();
                },

                eventClick: function(info) {
                    if (confirm("ELIMINARE '" + info.event.title + "'?")) {
                        info.event.remove();
                    } else if (confirm("Cambiare lo stato dello SWITCH?")) {
                        info.event.setExtendedProp('isSwitch', !info.event.extendedProps.isSwitch);
                    } else {
                        let n = prompt("Nuova nota:", info.event.extendedProps.note);
                        if(n !== null) info.event.setExtendedProp('note', n);
                    }
                    syncToFirebase();
                },
                
                eventDrop: syncToFirebase,
                eventResize: syncToFirebase
            });

            calendar.render();

            eventsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                calendar.removeAllEvents();
                if (data) calendar.addEventSource(Object.values(data));
                document.getElementById('sync-status').innerText = "Sincronizzato ✔️";
                document.getElementById('sync-status').className = "sync-indicator sync-ok";
                setTimeout(ricalcolaColoriCelle, 100);
            });
        });

        function syncToFirebase() {
            const toSave = calendar.getEvents().map(e => ({
                title: e.title, start: e.startStr, allDay: e.allDay,
                extendedProps: e.extendedProps || {},
                className: e.classNames.join(' ').replace('event-has-notes','').replace('event-is-switch','').trim()
            }));
            eventsRef.set(toSave).then(() => {
                ricalcolaColoriCelle();
            });
        }
    </script>
</body>
</html>
